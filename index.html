<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>T-core 修行型タスク管理ゲーム</title>

  <!-- ここ超重要：このCSSがUIを作ってる -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app">
    <!-- 左：COACH -->
    <section class="panel">
      <h1>T-core</h1>

      <div id="coach-frame" class="coach-frame">
        <!-- 画像を表示 -->
        <img id="coach-image" src="assets/coach.png" alt="T-core Coach" />

        <!-- 画像が読み込めない時の代替（保険） -->
        <div id="coach-placeholder" class="coach-placeholder" style="display:none;">
          COACH
        </div>
      </div>

      <p id="coach-line" class="coach-line">まだ今日は完了報告がない。今すぐ1件終わらせよう。</p>
    </section>

    <!-- 中央：タスク -->
    <section class="panel">
      <h2>タスク追加</h2>

      <form id="task-form" class="task-form">
        <input id="task-title" type="text" placeholder="タイトル（必須）" required />

        <select id="task-category">
          <option value="筋トレ">筋トレ</option>
          <option value="英語">英語</option>
          <option value="勉強">勉強</option>
          <option value="仕事">仕事</option>
          <option value="思考">思考</option>
        </select>

        <select id="task-difficulty">
          <option value="EASY">EASY</option>
          <option value="HARD">HARD</option>
          <option value="EXTREME">EXTREME</option>
        </select>

        <input id="task-due" type="date" />

        <button type="submit">追加</button>
        <button id="boss-btn" class="ghost" type="button">月末ボス戦</button>
      </form>

      <div class="list-head">
        <h2 style="margin:0;">タスク一覧</h2>
      </div>

      <div id="empty-state" class="empty">タスクがありません。まず1つ追加しよう。</div>
      <ul id="task-list" class="task-list"></ul>
    </section>

    <!-- 右：ステータス -->
    <section class="panel">
      <h2>ステータス</h2>

      <dl class="stats-grid">
        <dt>レベル</dt><dd id="stat-level">1</dd>
        <dt>STR</dt><dd id="stat-str">0</dd>
        <dt>INT</dt><dd id="stat-int">0</dd>
        <dt>KNOWLEDGE</dt><dd id="stat-knowledge">0</dd>
        <dt>SOCIAL</dt><dd id="stat-social">0</dd>
        <dt>WISDOM</dt><dd id="stat-wisdom">0</dd>
        <dt>DISCIPLINE</dt><dd id="stat-discipline">0</dd>
        <dt>覚醒率</dt><dd id="stat-awake">0%</dd>
        <dt>連続達成日数</dt><dd id="stat-streak">0日</dd>
        <dt>連続未達成日数</dt><dd id="stat-streak-high">0日</dd>
      </dl>

      <div class="meter-wrap">
        <div>覚醒ゲージ</div>
        <div class="meter"><div id="awakening-fill" class="meter-fill awakening"></div></div>
      </div>

      <div class="meter-wrap">
        <div>闇ゲージ</div>
        <div class="meter"><div id="dark-fill" class="meter-fill dark"></div></div>
      </div>

      <div id="boss-result" class="boss-result">ボス戦の準備はできているか？</div>
    </section>
  </div>

  <!-- JS（これがゲームを動かす） -->
  <script src="app.js"></script>
  <script src="game.js"></script>
</body>
</html>
