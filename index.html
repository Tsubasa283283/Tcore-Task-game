<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>T-core 修行型タスク管理ゲーム</title>

    <!-- ここ超重要：UIのCSS -->
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <div class="app">
      <!-- 左：COACH -->
      <section class="panel">
        <h1>T-core</h1>

        <div id="coach-frame" class="coach-frame">
          <img id="coach-image" src="./assets/coach.png" alt="T-core Coach" />
          <div id="coach-placeholder" class="coach-placeholder" hidden>COACH</div>
          <div id="fall-badge" class="fall-badge" hidden>FALL</div>
        </div>

        <p id="coach-line" class="coach-line">
          まだ今日は完了報告がない。今すぐ1件終わらせよう。
        </p>
      </section>

      <!-- 中央：タスク -->
      <main class="panel">
        <h2>タスク追加</h2>

        <form id="task-form" class="task-form">
          <input id="title" placeholder="タイトル（必須）" required />

          <select id="category">
            <option>筋トレ</option>
            <option>英語</option>
            <option>勉強</option>
            <option>仕事</option>
            <option>思考</option>
          </select>

          <select id="difficulty">
            <option>EASY</option>
            <option>HARD</option>
            <option>EXTREME</option>
          </select>

          <!-- app.js が見てるID -->
          <input id="dueDate" type="date" />

          <!-- app.js が見てるID -->
          <button id="submit-btn" type="submit">追加</button>

          <!-- app.js が見てるID -->
          <button id="boss-battle" type="button" class="ghost">月末ボス戦</button>

          <!-- app.js が見てるID（編集時に使う） -->
          <button id="cancel-edit" type="button" class="ghost" hidden>キャンセル</button>
        </form>

        <div class="list-head">
          <h2>タスク一覧</h2>
        </div>

        <ul id="task-list" class="task-list"></ul>
        <div id="empty" class="empty" style="display:none;">
          タスクがありません。まず1つ追加しよう。
        </div>
      </main>

      <!-- 右：ステータス -->
      <aside class="panel">
        <h2>ステータス</h2>

        <!-- app.js がここにHTMLを流し込む -->
        <dl id="stats-grid" class="stats-grid"></dl>

        <div class="meter-wrap">
          <div>覚醒ゲージ</div>
          <div class="meter">
            <div id="awakening-bar" class="meter-fill awakening"></div>
          </div>
        </div>

        <div class="meter-wrap">
          <div>闇ゲージ</div>
          <div class="meter">
            <div id="dark-bar" class="meter-fill dark"></div>
          </div>
        </div>

        <div id="boss-result" class="boss-result">ボス戦の準備はできているか？</div>
      </aside>
    </div>

    <!-- JS（これも超重要） -->
    <script src="./game.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
